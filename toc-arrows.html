<script>
// Left sidebar: start with the "Course Information" section collapsed
// while lecture sections stay expanded (collapse-level: 2 expands all;
// Quarto has no per-section setting, so this collapses just that one).
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll("#quarto-sidebar .sidebar-item-section").forEach(function (sec) {
    var text = sec.querySelector(":scope > .sidebar-item-container .menu-text");
    if (!text || text.textContent.trim() !== "Course Information") return;
    var sub = sec.querySelector(":scope > ul.collapse");
    if (sub) sub.classList.remove("show");
    sec.querySelectorAll(":scope > .sidebar-item-container a[data-bs-toggle]").forEach(function (a) {
      a.setAttribute("aria-expanded", "false");
    });
  });
});
</script>
<script>
// Add expand/collapse arrows to right-pane TOC entries that have subsections.
// Clicking the arrow toggles the subsection list without navigating; an
// inline display style is used so Quarto's scroll-spy can't override it.
document.addEventListener("DOMContentLoaded", function () {
  var toc = document.getElementById("TOC");
  if (!toc) return;
  toc.querySelectorAll("li").forEach(function (li) {
    var sub = li.querySelector(":scope > ul");
    var link = li.querySelector(":scope > a");
    if (!sub || !link) return;
    var btn = document.createElement("span");
    btn.className = "toc-chevron";
    btn.setAttribute("role", "button");
    btn.setAttribute("tabindex", "0");
    btn.setAttribute("aria-label", "Toggle subsections");
    btn.setAttribute("title", "Show/hide subsections");
    btn.setAttribute("aria-expanded", "false");
    link.after(btn);
    function toggle(e) {
      e.preventDefault();
      e.stopPropagation();
      var open = sub.style.display === "block";
      sub.style.display = open ? "" : "block";
      btn.classList.toggle("toc-chevron-expanded", !open);
      btn.setAttribute("aria-expanded", String(!open));
    }
    btn.addEventListener("click", toggle);
    btn.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") toggle(e);
    });
  });
});
</script>
