<script>
// Add expand/collapse arrows to right-pane TOC entries that have subsections.
// Clicking the arrow toggles the subsection list without navigating; an
// inline display style is used so Quarto's scroll-spy can't override it.
document.addEventListener("DOMContentLoaded", function () {
  var toc = document.getElementById("TOC");
  if (!toc) return;
  toc.querySelectorAll("li").forEach(function (li) {
    var sub = li.querySelector(":scope > ul");
    var link = li.querySelector(":scope > a");
    if (!sub || !link) return;
    var btn = document.createElement("span");
    btn.className = "toc-chevron";
    btn.setAttribute("role", "button");
    btn.setAttribute("tabindex", "0");
    btn.setAttribute("aria-label", "Toggle subsections");
    btn.setAttribute("aria-expanded", "false");
    link.after(btn);
    function toggle(e) {
      e.preventDefault();
      e.stopPropagation();
      var open = sub.style.display === "block";
      sub.style.display = open ? "" : "block";
      btn.classList.toggle("toc-chevron-expanded", !open);
      btn.setAttribute("aria-expanded", String(!open));
    }
    btn.addEventListener("click", toggle);
    btn.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") toggle(e);
    });
  });
});
</script>
